<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- 禁用缓存 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">

<title>读城：小砚的泉州穿越之旅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .bg-pc {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: url("bg.jpg") center center / cover no-repeat;
    z-index: -2;
  }
  .bg-m {
    display: none;
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: url("bg-m.jpg") center top / cover no-repeat;
    z-index: -2;
  }
  .mask {
    position: fixed; inset: 0;
    background: rgba(255,255,255,0.75);
    z-index: -1; pointer-events: none;
  }

  body {
    min-height: 100vh;
    color: #2b2a27;
    font-family: "Microsoft YaHei","PingFang SC",serif;
    line-height: 1.85;
    background: transparent;
  }

  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 70px 20px;
    position: relative; z-index: 1;
  }
  .header {
    text-align: center;
    margin-bottom: 60px;
  }
  .header h1 {
    font-size: 42px;
    font-weight: 500;
    color: #1f1d1a;
    margin-bottom: 12px;
  }
  .header p {
    font-size: 17px;
    color: #555;
    max-width: 780px;
    margin: 0 auto;
  }

  .text {
    max-width: 820px;
    margin: 0 auto 50px auto;
    font-size: 16px;
  }
  .text h2 {
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 14px;
    color: #24221e;
  }
  .text p {
    margin-bottom: 1em;
  }

  .post-card {
    background: #fff;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.07);
    margin: 70px 0;
  }

  /* ↓↓↓ 手机端彻底修复：固定比例 + 不变形 ↓↓↓ */
  .viewer-wrapper {
    position: relative;
    width: 100%;
    padding-top: 58.33%; /* 12:7 固定比例，永远不变形 */
    background: #d5d5d5;
    border-radius: 8px;
    overflow: hidden;
  }
  .viewer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  .log{
    font-size:18px;
    color:#8a5a32;
    text-align:center;
    margin-bottom:10px;
  }

  .gap { height: 100px; }

  @media (max-width:768px) {
    .bg-pc { display: none; }
    .bg-m { display: block; }
    .header h1 { font-size: 28px; }
    .text h2 { font-size: 22px; }
    .post-card { padding: 12px; margin: 40px 0; }
    .gap { height: 60px; }
  }
</style>
</head>

<body>
<div class="bg-pc"></div>
<div class="bg-m"></div>
<div class="mask"></div>

<div class="container">

  <div class="text">
    <h2>序：小马虎与一本旧书</h2>
    <p>小学生林砚，是个出了名的“小马虎”。老师讲的泉州古建筑故事，他总左耳进右耳出，觉得老房子闷、老故事远……</p>
  </div>
  <div class="gap"></div>

  <!-- 万寿塔 -->
  <div class="text">
    <h2>第一站：万寿塔 —— 勇敢者的导航塔</h2>
    <p>...</p>
  </div>
  <div class="post-card">
    <div class="log" id="log5">加载中...</div>
    <div class="viewer-wrapper"><div class="viewer" id="v5"></div></div>
  </div>
  <div class="gap"></div>

  <!-- 清净寺 -->
  <div class="text">
    <h2>第二站：清净寺 —— 好朋友的聚集地</h2>
    <p>...</p>
  </div>
  <div class="post-card">
    <div class="log" id="log3">加载中...</div>
    <div class="viewer-wrapper"><div class="viewer" id="v3"></div></div>
  </div>
  <div class="gap"></div>

  <!-- 天后宫 -->
  <div class="text">
    <h2>第三站：天后宫 —— 大家的祈福屋</h2>
    <p>...</p>
  </div>
  <div class="post-card">
    <div class="log" id="log4">加载中...</div>
    <div class="viewer-wrapper"><div class="viewer" id="v4"></div></div>
  </div>
  <div class="gap"></div>

  <!-- 朝东楼 -->
  <div class="text">
    <h2>第四站：朝东楼 —— 爱国的小城堡</h2>
    <p>...</p>
  </div>
  <div class="post-card">
    <div class="log" id="log1">加载中...</div>
    <div class="viewer-wrapper"><div class="viewer" id="v1"></div></div>
  </div>
  <div class="gap"></div>

  <!-- 坑墙楼 -->
  <div class="text">
    <h2>第五站：坑墙楼 —— 游子的想家屋</h2>

  <div class="post-card">
    <div class="log" id="log2">加载中...</div>

  </div>
  <div class="gap"></div>

  <div class="text" style="text-align:center">
    <h2>梦醒：小砚真正长大了</h2>

  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js'

THREE.Cache.enabled = false
const draco = new DRACOLoader()
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/')
const loader = new GLTFLoader()
loader.setDRACOLoader(draco)

async function createViewer(containerId, logId, url, cam, az=0, pitch=0.35){
  const dom = document.getElementById(containerId)
  const log = document.getElementById(logId)
  log.textContent = '⏳ 加载中...'

  const scene = new THREE.Scene()
  scene.background = new THREE.Color(0xd5d5d5)

  // ↓↓↓ 相机自适应，手机永远不变形 ↓↓↓
  const camera = new THREE.PerspectiveCamera(50, 12/7, 0.1, 2000)
  camera.position.copy(cam)

  const renderer = new THREE.WebGLRenderer({antialias:true})
  dom.appendChild(renderer.domElement)

  // ↓↓↓ 自动适应容器尺寸 ↓↓↓
  function resize(){
    const rect = dom.getBoundingClientRect()
    renderer.setSize(rect.width, rect.height)
    camera.aspect = rect.width / rect.height
    camera.updateProjectionMatrix()
  }
  resize()
  window.addEventListener('resize', resize)

  let azimuth = -Math.PI/2 + az
  let polar = Math.PI/2 - pitch
  const sensitivity = 0.003

  // 鼠标
  dom.addEventListener('mousemove', e=>{
    if(!e.buttons) return
    azimuth -= e.movementX * sensitivity
    polar -= e.movementY * sensitivity
    polar = Math.max(Math.PI/6, Math.min(Math.PI*5/6, polar))
  })

  // 触屏
  let touchX=0,touchY=0
  dom.addEventListener('touchstart',e=>{
    touchX = e.touches[0].clientX
    touchY = e.touches[0].clientY
  })
  dom.addEventListener('touchmove',e=>{
    e.preventDefault()
    const dx = e.touches[0].clientX - touchX
    const dy = e.touches[0].clientY - touchY
    touchX = e.touches[0].clientX
    touchY = e.touches[0].clientY
    azimuth -= dx * sensitivity
    polar -= dy * sensitivity
    polar = Math.max(Math.PI/6, Math.min(Math.PI*5/6, polar))
  })

  const light = new THREE.AmbientLight(0xffffff,2)
  scene.add(light)

  await new Promise(resolve=>{
    loader.load(url+'?t='+Date.now(),gltf=>{
      scene.add(gltf.scene)
      log.textContent='✅ 就绪'
      log.style.color='green'
      resolve()
    },undefined,()=>{
      log.textContent='❌ 加载失败'
      log.style.color='red'
      resolve()
    })
  })

  function ani(){
    requestAnimationFrame(ani)
    const dir=new THREE.Vector3(
      Math.sin(azimuth)*Math.sin(polar),
      Math.cos(polar),
      Math.cos(azimuth)*Math.sin(polar)
    )
    camera.lookAt(camera.position.x+dir.x,camera.position.y+dir.y,camera.position.z+dir.z)
    renderer.render(scene,camera)
  }
  ani()
}

(async function(){
  await createViewer('v1','log1','./chaodonglou_f5.glb',new THREE.Vector3(3,2,4),0,0.17)
  await createViewer('v2','log2','./kenqianglou_f5.glb',new THREE.Vector3(30,3,0))
  await createViewer('v3','log3','./qingjinsi_f1.glb',new THREE.Vector3(3,3,-20),Math.PI/2)
  await createViewer('v4','log4','./tianhougong_f1.glb',new THREE.Vector3(25,3,-1),0,0.17)
  await createViewer('v5','log5','./wanshouta_f1.glb',new THREE.Vector3(25,2,4))
})()
</script>
</body>
</html>
